<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Baixe o aplicativo oficial da Genesis MMA." />
  <meta name="theme-color" content="#000000" />
  <title>Genesis MMA — Baixar app</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --text: #f5f5f5;
      --muted: #9e9e9e;
      --accent: #d32f2f;
      --accent-hover: #e53935;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    main {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo-area {
      margin-bottom: 28px;
    }
    .logo-area h1 {
      margin: 0;
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--accent);
    }
    .logo-area p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: var(--accent);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    a.download:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    a.download:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }
    .hint {
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-area">
      <h1>GENESIS MMA</h1>
      <p>Muay Thai · Jiu-Jitsu · MMA</p>
    </div>
    <div class="card">
      <p>Aplicativo oficial para alunos: presença, perfil e avisos.</p>
      <a
        class="download"
        href="downloads/genesismma.apk"
        download="genesismma.apk"
        >Baixar APK (Android)</a
      >
      <p class="hint">
        No Android: permita instalação de fontes desconhecidas se o sistema
        pedir. Versão atualizada pelo time da academia.
      </p>
    </div>
    <footer>Genesis MMA — download seguro via Firebase Hosting</footer>
  </main>
</body>
</html>
