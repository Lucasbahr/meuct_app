# Spark (grátis): Hosting não aceita .apk. Firebase Storage exige Blaze → APK no GitHub Releases.
# Página em Firebase Hosting com link https://github.com/OWNER/REPO/releases/latest/download/genesismma.apk

name: Build APK & Firebase Hosting

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar versão automática
        run: |
          VERSION_NAME=$(date +'%Y.%m.%d')
          BUILD_NUMBER=${{ github.run_number }}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build APK (release)
        env:
          API_BASE_URL: https://meuct-api-hml-301033312521.us-central1.run.app
        run: |
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Preparar artefato para Release
        run: |
          cp -f build/app/outputs/flutter-apk/app-release.apk genesismma.apk
          ls -lh genesismma.apk

      - name: Publicar APK no GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_id }}
          name: Genesis MMA ${{ env.VERSION_NAME }} (build ${{ env.BUILD_NUMBER }})
          body: |
            APK automático — `${{ github.sha }}`
          files: genesismma.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Injetar link do APK na página (GitHub Releases)
        run: |
          URL="https://github.com/${{ github.repository }}/releases/latest/download/genesismma.apk"
          sed -i "s|__APK_DOWNLOAD_URL__|${URL}|g" public/index.html
          grep -o 'href="[^"]*genesismma' public/index.html || true

      - name: Credencial Firebase (só Hosting)
        run: |
          echo "$FIREBASE_SA_JSON" > "$GITHUB_WORKSPACE/firebase-sa.json"
          test -s firebase-sa.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project meuct-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json

      - name: Remover credencial local
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/firebase-sa.json"
