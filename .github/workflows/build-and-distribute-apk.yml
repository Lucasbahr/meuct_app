name: Build APK & Firebase Hosting

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar versão automática
        run: |
          VERSION_NAME=$(date +'%Y.%m.%d')
          BUILD_NUMBER=${{ github.run_number }}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: APK para Firebase Hosting
        run: |
          mkdir -p public/downloads
          cp -f build/app/outputs/flutter-apk/app-release.apk public/downloads/genesismma.apk
          ls -lh public/downloads/
          ls -lh public/

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Credencial Firebase (Service Account)
        run: |
          echo "$FIREBASE_SA_JSON" > "$GITHUB_WORKSPACE/firebase-sa.json"
          test -s firebase-sa.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project meuct-app --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json

      - name: Remover credencial local
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/firebase-sa.json"
