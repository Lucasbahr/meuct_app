name: Build & Distribute APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar versão automática
        run: |
          VERSION_NAME=$(date +'%Y.%m.%d')
          BUILD_NUMBER=${{ github.run_number }}

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Build AAB (futuro Play Store)
        run: flutter build appbundle --release

      - name: Verificar APK
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Renomear APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/genesismma-v${VERSION_NAME}-build${BUILD_NUMBER}.apk"

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      # 🔐 Cria arquivo da service account a partir do secret
      - name: Criar credencial Firebase (Service Account)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-key.json

      - name: Distribuir no Firebase
        run: |
          firebase appdistribution:distribute \
            "build/app/outputs/flutter-apk/genesismma-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "alunos" \
            --release-notes "Release ${VERSION_NAME} (build ${BUILD_NUMBER}) - commit ${{ github.sha }}" \
            --debug
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-key.json